<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Мой первый сайт с мозгами</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Мой первый сайт с мозгами</h1>
    <p>Напиши, как ты себя чувствуешь</p>

    <form method="post">
        <textarea name="message" rows="4" cols="50"
            placeholder="Например: Сегодня отличный день!"
            required>{{ user_text }}</textarea><br>
        <button type="submit">Анализировать</button>
    </form>

    {% if recommendation_text %}
    <div class="result">
        <h3>Ваше настроение:</h3>
        <p>{{ recommendation_text }}</p>

        <h3>{{ recommendation_title }}</h3>
        <div class="movie-list">
            {% for movie in movies_list %}
            <p>{{ movie }}</p>
            {% endfor %}
        </div>
    </div>
    {% endif %}
</body>
</html>
